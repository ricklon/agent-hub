server:
  host: "0.0.0.0"
  ws_port: 8000
  http_port: 8003
  dashboard_port: 8001
  # Override the WebSocket URL sent to devices on check-in.
  # Leave empty to auto-detect from the server's LAN IP.
  websocket: ""
  # Preferred: IANA timezone name so daylight saving time is handled.
  # Leave empty to use timezone_offset below.
  timezone: "America/New_York"
  # Fallback hours from UTC (e.g. -8 for PST, 8 for CST/Beijing)
  timezone_offset: -8
  # Shared secret for the image explain endpoint (sent to devices on check-in).
  # Leave empty to disable auth (fine for LAN-only deployments).
  image_token: ""

llm:
  default_provider: openai
  # Vision model used by the image explain endpoint (POST /xiaozhi/v1/image/).
  # Must support vision/image_url inputs. Defaults to google/gemma-3-27b-it on OpenRouter.
  vision_model: "google/gemma-3-27b-it"
  openai:
    api_key: "YOUR_OPENAI_API_KEY"
    model: "gpt-4o-mini"
    base_url: null  # set to Ollama/LM Studio URL for local inference
  anthropic:
    api_key: "YOUR_ANTHROPIC_API_KEY"
    model: "claude-haiku-4-5-20251001"

tts:
  default_provider: edge
  edge:
    voice: "en-US-AriaNeural"
    rate: "+0%"
    volume: "+0%"
  kitten:
    # Available: kitten-tts-mini-0.8 (80M), kitten-tts-micro-0.8 (40M),
    #            kitten-tts-nano-0.8 (15M), kitten-tts-nano-0.8-int8 (15M/25MB)
    model: "KittenML/kitten-tts-nano-0.8"
    # Available voices: Bella, Jasper, Luna, Bruno, Rosie, Hugo, Kiki, Leo
    voice: "Luna"
    speed: 1.0

asr:
  default_provider: funasr
  funasr:
    model_dir: "models/SenseVoiceSmall"
    language: "en"  # auto | en | zh | ja | ko | yue
  openai_whisper:
    api_key: null  # inherits llm.openai.api_key when omitted
    model: "whisper-1"
    language: "en"

vad:
  silero:
    model_path: "models/silero_vad.onnx"
    threshold: 0.5
    threshold_low: 0.2
    min_silence_duration_ms: 1000

registry:
  db_path: "data/registry.db"

hub:
  default_persona:
    name: "hub-default"
    llm_provider: openai
    tts_provider: edge
    asr_provider: openai_whisper
    system_prompt: |
      You are a helpful voice assistant.
      Keep responses concise and conversational — two sentences or fewer.
